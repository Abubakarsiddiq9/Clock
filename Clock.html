<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Clock.css">
</head>
<body>
    <div class="Hero">
        <div class="main">
            <div class="Clock">
                <div class="hand hour" id="hour-hand"></div>
                <div class="hand minute" id="minute-hand"></div>
                <div class="hand second" id="second-hand"></div>
                <div class="center-dot"></div>
                <div class="numbers">
                <div class="number" style="--i:1">1</div>
                    <div class="number" style="--i:2">2</div>
                    <div class="number" style="--i:3">3</div>
                    <div class="number" style="--i:4">4</div>
                    <div class="number" style="--i:5">5</div>
                    <div class="number" style="--i:6">6</div>
                    <div class="number" style="--i:7">7</div>
                    <div class="number" style="--i:8">8</div>
                    <div class="number" style="--i:9">9</div>
                    <div class="number" style="--i:10">10</div>
                    <div class="number" style="--i:11">11</div>
                    <div class="number" style="--i:12">12</div>
                </div>

            </div>
            <div class="Time">
                <span id="hrs">01</span>
                <span>:</span>
                <span id="min">25</span>
                <span>:</span>
                <span id="sec">78</span>
            </div>
            <div class="StopTimer">
                <button class="buttonSt" id="stopwatchbtn">Stopwatch</button>
                <button class="buttonSt" id="timerbtn">Timer</button>
            </div>
            <div class="Alarm">
                <button class="alarmButton">Set alarm</button>
            </div>

        </div>
        <div id="timerContainer" style="display: none;"></div>
    </div>    
 <script src="Clock.js"></script>
</body>
</html>
