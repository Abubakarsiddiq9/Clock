<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body{
      color: rgb(0, 0, 0);
      font-family: Arial, Helvetica, sans-serif;
      font-weight: bold;
    }
    .blue{
    width: 450px;
    height: 670px;
    padding: 10px;
    border-radius: 5px;
    background-color: rgb(143, 143, 146);
    
    }
    .timerdiv{
      background-color: rgb(84, 82, 82);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 50px;
      font-size: 37px;
      
      padding: 10px;
      border-radius: 10px;
    }
    .inputbox{
      padding: 15px;
      font-size: 25px;
      border: none;
      border-radius: 20px;
      background-color: rgb(205, 200, 200);
      margin-left: 15px;
    }
    .timerBelow{
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 30px;
      background-color: rgb(102, 103, 102);
      padding: 15px;
    }
    .startcss{
      padding: 18px;
      font-weight: bold;
      font-size: 30px;
      border-radius: 5px;
      border: none;
      transition: background-color 0.3s ease, transform 0.1s ease;
      cursor: pointer;
    }
    .startcss:hover {
  background-color: #302f2f; /* slightly darker green */
  color: white;
}

/* Active (clicked) style */
.startcss:active {
  background-color: #0a0a0a; /* even darker green */
  transform: scale(0.97);    /* press-down effect */
}

    .closeTimer{
      border: none;
      width: 25px;
      height: 25px;
      font-weight: bold;
    }
    .closeTimer:hover{
      cursor: pointer;
      background-color: rgb(148, 39, 39);
    }
  </style>
</head>
<body>
  <div class="blue"> 
    <button class="closeTimer js-closeTimer">X</button>
    <h1 style="margin-left: 40%;margin-bottom: 20%;margin-top: 10%;">Timer</h1>
      <div class="timerBelow">
      <div>
        <p style="font-size: 18px;">Select Time (hh:mm:ss):</p>
        <input class="inputbox" type="time" id="myTime" step="1" value="00:01:00">
      </div>
      <div class="timerdiv timerjs">
        <span id="hrs">00</span>
        <span>:</span>
        <span id="min">00</span>
        <span >:</span>
        <span id="sec">00</span>
      </div>
      <button class="StartBtn startcss">Start</button>
      </div>
  </div>
  <script>
    const timeInput=document.getElementById('myTime');
    const StartBtn=document.querySelector('.StartBtn');
    const hrsSpan = document.getElementById('hrs');
    const minSpan = document.getElementById('min');
    const secSpan = document.getElementById('sec');    
    let intervalId;
    StartBtn.addEventListener('click',()=>{
      let timeInputgot=timeInput.value;
      if (timeInputgot) {
      const [hours, minutes, seconds = "00"] = timeInputgot.split(':');
     let totalSeconds =
        parseInt(hours) * 3600 +
        parseInt(minutes) * 60 +
        parseInt(seconds);

       clearInterval(intervalId);

      updateDisplay(totalSeconds);

      intervalId = setInterval(() => {
        totalSeconds--;
        if (totalSeconds < 0) {
          clearInterval(intervalId);
          alert('Time up!')
          return;
        }
        updateDisplay(totalSeconds);
      }, 1000);
    } else {
      alert('Please enter a valid time');
    }
    
  });
  function updateDisplay(totalSeconds) {
    const hrs = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
    const mins = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
    const secs = String(totalSeconds % 60).padStart(2, '0');

    hrsSpan.textContent = hrs;
    minSpan.textContent = mins;
    secSpan.textContent = secs;
  }
  </script>
</body>
</html>
